<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>GameCenter — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --bg: #0a0a0f;
        }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.12) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 95%, rgba(99,102,241,0.08) 0%, transparent 45%);
            color: #e8e8f4;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            overflow-y: auto;
        }

        .bg-orb {
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
        }
        .bg-orb-1 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(99,102,241,0.1) 0%, transparent 70%);
            top: -200px; left: -200px;
            animation: orbFloat 12s ease-in-out infinite;
        }
        .bg-orb-2 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(139,92,246,0.08) 0%, transparent 70%);
            bottom: -150px; right: -150px;
            animation: orbFloat 15s ease-in-out infinite reverse;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0,0); }
            33% { transform: translate(40px,-30px); }
            66% { transform: translate(-25px,20px); }
        }

        .container {
            position: relative; z-index: 1;
            width: 100%; max-width: 420px;
            display: flex; flex-direction: column; align-items: center;
        }

        .logo-wrap { text-align: center; margin-bottom: 18px; }

        .logo-icon {
            font-size: 2.2rem; display: block; margin-bottom: 6px;
            animation: iconPulse 3s ease-in-out infinite;
        }
        @keyframes iconPulse {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(99,102,241,0.8)); }
            50% { filter: drop-shadow(0 0 40px rgba(139,92,246,1)); }
        }

        .logo {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.7rem; font-weight: 800;
            letter-spacing: -0.5px;
            background: var(--gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 3px;
        }

        .logo-tagline {
            font-size: 0.78rem; color: #4a5568; letter-spacing: 0.5px;
        }

        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(99,102,241,0.2);
            border-top: 1px solid rgba(99,102,241,0.4);
            border-radius: 20px; padding: 22px; width: 100%;
            box-shadow: 0 24px 64px rgba(0,0,0,0.6), inset 0 1px 0 rgba(99,102,241,0.08);
            backdrop-filter: blur(16px);
        }

        .tabs {
            display: flex; background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.07); border-radius: 12px;
            padding: 4px; margin-bottom: 18px; gap: 4px;
        }

        .tab {
            flex: 1; padding: 9px; text-align: center;
            font-size: 0.88rem; font-weight: 600; font-family: 'Inter', sans-serif;
            color: #64748b; border: none; border-radius: 9px;
            background: transparent; cursor: pointer; transition: all 0.25s; letter-spacing: 0.3px;
        }
        .tab.active { background: var(--gradient); color: #fff; box-shadow: 0 2px 16px rgba(99,102,241,0.4); }
        .tab:not(.active):hover { color: #ccc; }

        .panel { display: none; }
        .panel.active { display: block; }

        label {
            display: block; font-size: 0.75rem; font-weight: 600; color: #64748b;
            margin-bottom: 5px; margin-top: 10px; letter-spacing: 0.5px; text-transform: uppercase;
        }
        label:first-of-type { margin-top: 0; }

        input[type="text"], input[type="password"] {
            width: 100%; padding: 9px 12px;
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px; color: #fff; font-size: 0.9rem;
            font-family: 'Inter', sans-serif; outline: none;
            transition: border 0.2s, box-shadow 0.2s;
        }
        input:focus {
            border-color: rgba(99,102,241,0.6); box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }

        .btn {
            width: 100%; padding: 11px; margin-top: 14px;
            background: var(--gradient); color: #fff;
            font-size: 0.95rem; font-weight: 700; font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px; border: none; border-radius: 10px;
            cursor: pointer; transition: all 0.25s; box-shadow: 0 4px 24px rgba(99,102,241,0.4);
        }
        .btn:hover { box-shadow: 0 6px 32px rgba(99,102,241,0.6); transform: translateY(-1px); filter: brightness(1.1); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #1e2030; color: #444; box-shadow: none; cursor: not-allowed; transform: none; filter: none; }

        .msg {
            font-size: 0.8rem; margin-top: 12px; text-align: center;
            display: none; padding: 9px 12px; border-radius: 8px;
        }
        .msg.error { color: #f87171; background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); }
        .msg.success { color: #4ade80; background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); }

        .perks { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
        .perk {
            background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.25);
            border-radius: 20px; padding: 4px 10px; font-size: 0.74rem; color: #818cf8; font-weight: 500;
        }

        .hint { font-size: 0.78rem; color: #374151; text-align: center; margin-top: 10px; line-height: 1.5; }
        .hint a { color: var(--primary); text-decoration: none; }
        .hint a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <div class="container">
        <div class="logo-wrap">
            <span class="logo-icon">🎮</span>
            <div class="logo">GameCenter</div>
            <div class="logo-tagline">Your hub for online tools & apps</div>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Log In</button>
                <button class="tab" onclick="switchTab('register')">Sign Up</button>
            </div>

            <div id="loginPanel" class="panel active">
                <label>Username</label>
                <input type="text" id="loginUser" placeholder="Enter your username" autocomplete="username" />
                <label>Password</label>
                <input type="password" id="loginPass" placeholder="Enter your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()" />
                <div class="msg error" id="loginErr"></div>
                <button class="btn" id="loginBtn" onclick="doLogin()">Log In →</button>
                <p class="hint">No account? <a href="#" onclick="switchTab('register');return false;">Sign Up free</a></p>
            </div>

            <div id="registerPanel" class="panel">
                <div class="perks">
                    <span class="perk">🕹️ Games</span>
                    <span class="perk">🤖 Bot Tools</span>
                    <span class="perk">🛍️ Shop</span>
                    <span class="perk">⚡ Free</span>
                </div>
                <label>Username</label>
                <input type="text" id="regUser" placeholder="Pick a username (min 3 chars)" autocomplete="username" />
                <label>Password</label>
                <input type="password" id="regPass" placeholder="Pick a password (min 4 chars)" autocomplete="new-password" />
                <label>Confirm Password</label>
                <input type="password" id="regPass2" placeholder="Repeat your password" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()" />
                <div class="msg error" id="regErr"></div>
                <div class="msg success" id="regOk"></div>
                <button class="btn" id="regBtn" onclick="doRegister()">Create Account →</button>
                <p class="hint">Free forever. All tools included.</p>
            </div>
        </div>
    </div>

    <script>
        fetch('/session').then(r => r.json()).then(({ tier }) => {
            if (tier) window.location.href = '/dashboard.html';
        });

        function switchTab(tab) {
            document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
            document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
            });
        }

        function showMsg(id, text, type) {
            const el = document.getElementById(id);
            el.textContent = text; el.className = 'msg ' + type; el.style.display = 'block';
        }
        function hideMsg(id) { document.getElementById(id).style.display = 'none'; }

        function doLogin() {
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value;
            const btn = document.getElementById('loginBtn');
            if (!username || !password) return showMsg('loginErr', 'Please enter your username and password.', 'error');
            btn.disabled = true; btn.textContent = 'Logging in...'; hideMsg('loginErr');
            fetch('/auth', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) })
            .then(r => r.json())
            .then(data => {
                if (data.success) { window.location.href = '/dashboard.html'; }
                else { showMsg('loginErr', data.error || 'Incorrect username or password.', 'error'); btn.disabled = false; btn.textContent = 'Log In →'; }
            })
            .catch(() => { showMsg('loginErr', 'Connection error. Try again.', 'error'); btn.disabled = false; btn.textContent = 'Log In →'; });
        }

        function doRegister() {
            const username = document.getElementById('regUser').value.trim();
            const password = document.getElementById('regPass').value;
            const password2 = document.getElementById('regPass2').value;
            const btn = document.getElementById('regBtn');
            hideMsg('regErr'); hideMsg('regOk');
            if (!username || !password) return showMsg('regErr', 'Please fill in all fields.', 'error');
            if (password !== password2) return showMsg('regErr', 'Passwords do not match.', 'error');
            btn.disabled = true; btn.textContent = 'Creating account...';
            fetch('/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) })
            .then(r => r.json())
            .then(data => {
                if (data.success) { window.location.href = '/dashboard.html'; }
                else { showMsg('regErr', data.error || 'Registration failed.', 'error'); btn.disabled = false; btn.textContent = 'Create Account →'; }
            })
            .catch(() => { showMsg('regErr', 'Connection error. Try again.', 'error'); btn.disabled = false; btn.textContent = 'Create Account →'; });
        }
    </script>
    <script src="/viewers.js"></script>
<script src="https://replit-cdn.com/replit-pill/replit-pill.global.js" data-repl-id="45ee3ada-87b7-4ffc-bb63-88f79a548f3e"></script></body>
</html>
