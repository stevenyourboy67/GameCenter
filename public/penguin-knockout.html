<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Penguin Knockout</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
  #c { display: block; width: 100vw; height: 100vh; }

  /* ── SHARED PILL STYLES ──────────────────────── */
  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 22px; border-radius: 999px;
    border: 2.5px solid rgba(255,255,255,0.55);
    font-size: 1.1rem; font-weight: 800; color: #fff;
    white-space: nowrap; text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    letter-spacing: 0.01em;
  }

  /* ── LOBBY UI ────────────────────────────────── */
  #lobby-ui {
    position: fixed; inset: 0; pointer-events: none; z-index: 10;
    transition: opacity 0.5s;
  }
  #lobby-ui.hidden { opacity: 0; pointer-events: none; }

  #lobby-countdown {
    position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 7px;
    pointer-events: none;
  }
  #lc-pill {
    background: linear-gradient(135deg, #7dd3fc 0%, #38bdf8 50%, #0ea5e9 100%);
    box-shadow: 0 4px 18px rgba(14,165,233,0.45), 0 2px 6px rgba(0,0,0,0.25);
  }
  #lc-pill.urgent {
    background: linear-gradient(135deg, #f87171, #ef4444, #b91c1c);
    box-shadow: 0 4px 18px rgba(239,68,68,0.55), 0 2px 6px rgba(0,0,0,0.25);
  }
  #lc-penguins {
    display: flex; gap: 6px; align-items: center;
    padding: 6px 16px;
    background: rgba(0,0,0,0.45); border-radius: 999px;
    border: 2px solid rgba(255,255,255,0.3);
    font-size: 0.85rem; font-weight: 700; color: #fff;
    letter-spacing: 0.05em;
  }
  .lc-penguin-icon {
    width: 22px; height: 28px;
    background: #111; border-radius: 4px;
    border: 2px solid rgba(255,255,255,0.6);
    display: inline-block;
    position: relative; overflow: hidden;
  }
  .lc-penguin-icon::after {
    content: '🐧'; font-size: 16px; line-height: 26px;
    position: absolute; top: -1px; left: 1px;
  }

  /* AFK Button */
  #afk-btn {
    position: absolute; left: 22px; top: 50%; transform: translateY(-50%);
    pointer-events: all; cursor: pointer;
    width: 68px; height: 68px; border-radius: 14px;
    border: 3px solid rgba(255,255,255,0.6);
    background: linear-gradient(180deg, #facc15, #d97706);
    box-shadow: 0 6px 20px rgba(0,0,0,0.5), inset 0 2px 0 rgba(255,255,255,0.3);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px; user-select: none; transition: background 0.2s, box-shadow 0.2s;
  }
  #afk-btn .afk-label {
    font-size: 0.95rem; font-weight: 900; color: #fff; letter-spacing: 0.06em;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }
  #afk-btn .afk-sub {
    font-size: 0.45rem; font-weight: 700; color: rgba(255,255,255,0.8);
    text-align: center; letter-spacing: 0.03em;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }
  #afk-btn.active {
    background: linear-gradient(180deg, #f87171, #dc2626);
    box-shadow: 0 6px 24px rgba(220,38,38,0.65), inset 0 2px 0 rgba(255,255,255,0.2);
    border-color: rgba(255,200,200,0.7);
  }
  #afk-btn:active { transform: translateY(-50%) scale(0.94); }

  /* ── ARENA UI ────────────────────────────────── */
  #arena-ui {
    position: fixed; inset: 0; pointer-events: none; z-index: 10;
    transition: opacity 0.5s;
  }
  #arena-ui.hidden { opacity: 0; pointer-events: none; }

  #power-dock {
    position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%);
    width: min(660px, calc(100vw - 28px));
    display: grid; grid-template-columns: 62px minmax(0,1fr) 62px; gap: 12px;
    align-items: end; pointer-events: all;
  }
  .power-button {
    width: 62px; height: 62px; border: 4px solid rgba(255,255,255,0.9);
    border-radius: 16px; color: #fff; font-size: 2.25rem; font-weight: 900;
    line-height: 1; cursor: pointer;
    box-shadow: 0 12px 28px rgba(0,0,0,0.35), inset 0 2px 0 rgba(255,255,255,0.25);
    user-select: none;
  }
  .power-button.minus { background: linear-gradient(180deg,#ff6b78,#d71920); }
  .power-button.plus  { background: linear-gradient(180deg,#7dff8a,#16a032); }
  .power-button:active { transform: scale(0.96); }
  #meter { text-align: center; }
  #power-text {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 120px; height: 38px; margin-bottom: 8px; padding: 0 18px;
    border-radius: 999px; border: 3px solid rgba(255,255,255,0.75);
    background: rgba(0,0,0,0.58); color: #fff;
    font-size: 1.05rem; font-weight: 900; text-shadow: 0 2px 6px rgba(0,0,0,0.7);
  }
  #power-bar {
    height: 32px; padding: 4px; border-radius: 999px;
    border: 4px solid rgba(255,255,255,0.88);
    background: linear-gradient(180deg,#14285f,#020617);
    box-shadow: 0 15px 30px rgba(0,0,0,0.4), inset 0 4px 10px rgba(0,0,0,0.55);
    overflow: hidden;
  }
  #power-fill {
    height: 100%; width: 50%; border-radius: 999px;
    background: linear-gradient(90deg,#22c55e 0%,#facc15 55%,#ef4444 100%);
    box-shadow: inset 0 2px 5px rgba(255,255,255,0.35), 0 0 18px rgba(250,204,21,0.5);
    transition: width 0.12s ease-out;
  }
  #launch-banner {
    position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
    text-align: center; pointer-events: none;
    display: flex; flex-direction: column; align-items: center; gap: 7px;
  }
  #countdown-pill {
    background: linear-gradient(135deg,#7dd3fc,#38bdf8,#0ea5e9);
    box-shadow: 0 4px 18px rgba(14,165,233,0.45), 0 2px 6px rgba(0,0,0,0.25);
    transition: background 0.25s;
  }
  #countdown-pill.go {
    background: linear-gradient(135deg,#86efac,#4ade80,#16a34a);
    box-shadow: 0 4px 18px rgba(74,222,128,0.5), 0 2px 6px rgba(0,0,0,0.25);
    border-color: rgba(255,255,255,0.65);
  }
  #round-pill {
    display: inline-block; padding: 5px 18px;
    background: rgba(255,255,255,0.22); border: 2px solid rgba(255,255,255,0.45);
    border-radius: 999px; font-size: 0.9rem; font-weight: 800; color: #fff;
    letter-spacing: 0.06em; text-transform: uppercase;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3); box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  #aim-lock-btn {
    position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
    display: block; padding: 10px 28px;
    font-size: 0.95rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase; color: #fff;
    background: linear-gradient(135deg,#7c3aed,#4f46e5);
    border: 2px solid rgba(167,139,250,0.6); border-radius: 999px;
    box-shadow: 0 0 18px rgba(124,58,237,0.55), 0 4px 12px rgba(0,0,0,0.4);
    cursor: pointer; pointer-events: all; transition: box-shadow 0.15s;
  }
  #aim-lock-btn:hover { box-shadow: 0 0 28px rgba(124,58,237,0.85), 0 4px 12px rgba(0,0,0,0.4); }
  #aim-lock-btn.active {
    background: linear-gradient(135deg,#4f46e5,#7c3aed);
    box-shadow: 0 0 32px rgba(124,58,237,1), 0 4px 12px rgba(0,0,0,0.4);
  }

  /* Phase label */
  #phase-label {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 4rem; font-weight: 900; color: #fff;
    text-shadow: 0 4px 20px rgba(0,0,0,0.7);
    pointer-events: none; z-index: 20; opacity: 0;
    transition: opacity 0.3s;
  }
  #phase-label.show { opacity: 1; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- ── LOBBY UI ───────────────────────────────────────── -->
<div id="lobby-ui">
  <div id="lobby-countdown">
    <div id="lc-pill" class="pill">
      <span>🐧</span>
      <span id="lc-text">Launching in 15</span>
    </div>
    <div id="lc-penguins"></div>
  </div>

  <div id="afk-btn" role="button" tabindex="0">
    <div class="afk-label">AFK</div>
    <div class="afk-sub">CLICK TO<br>SIT OUT</div>
  </div>
</div>

<!-- ── ARENA UI ──────────────────────────────────────── -->
<div id="arena-ui" class="hidden">
  <div id="launch-banner">
    <div id="countdown-pill" class="pill">
      <span class="pill-icon">🐧</span>
      <span id="launch-count">Launching in 10</span>
    </div>
    <div id="round-pill" style="display:none"></div>
  </div>

  <div id="power-dock">
    <button class="power-button minus" id="minus" type="button">−</button>
    <div id="meter">
      <div id="power-text">POWER 5</div>
      <div id="power-bar"><div id="power-fill"></div></div>
    </div>
    <button class="power-button plus" id="plus" type="button">+</button>
  </div>
  <button id="aim-lock-btn" type="button">🎯 Aim Lock</button>
</div>

<div id="phase-label"></div>

<script>
fetch('/session').then(r => r.json()).then(({ tier }) => {
  if (!tier) window.location.href = '/login.html';
}).catch(() => {});
</script>

<script type="importmap">
{ "imports": { "three": "/three/build/three.module.js", "three/addons/": "/three/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';

// ── CONSTANTS ──────────────────────────────────────────────────────────────
const ARENA_HALF  = 9;         // square arena, half-size → 18×18 units
const WALL_INNER  = ARENA_HALF - 0.55;
const FALL_EDGE   = ARENA_HALF + 1.5;
const ARENA_CX    = 0;         // arena world origin X
const ARENA_CZ    = 0;
const LOBBY_CX    = -62;       // lobby world center X
const LOBBY_CZ    = -42;       // lobby world center Z
const LOBBY_COUNTDOWN_START = 15;
const ARENA_COUNTDOWN_START = 10;
const AI_COUNT    = 5;

// ── RENDERER ──────────────────────────────────────────────────────────────
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.08;

// ── SCENE ─────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9ee8ff);
scene.fog = new THREE.FogExp2(0xc8eeff, 0.012);

// ── LIGHTS ────────────────────────────────────────────────────────────────
scene.add(new THREE.HemisphereLight(0xdff9ff, 0x8ec8e0, 2.0));
const sun = new THREE.DirectionalLight(0xfff5e0, 2.2);
sun.position.set(-12, 22, 8);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = sun.shadow.camera.bottom = -90;
sun.shadow.camera.right = sun.shadow.camera.top  =  90;
scene.add(sun);

// ── WORLD GROUND (giant snow plane) ───────────────────────────────────────
const groundMat = new THREE.MeshStandardMaterial({ color: 0xe8f5ff, roughness: 0.9, metalness: 0 });
const ground = new THREE.Mesh(new THREE.PlaneGeometry(400, 400), groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.25;
ground.receiveShadow = true;
scene.add(ground);

// Distant mountains (decorative boxes in background)
const mtMat = new THREE.MeshStandardMaterial({ color: 0xb0d8f0, roughness: 1 });
const mtMat2 = new THREE.MeshStandardMaterial({ color: 0xd8eefc, roughness: 1 });
for (let i = 0; i < 18; i++) {
  const h = 14 + Math.random() * 22;
  const w = 10 + Math.random() * 16;
  const mt = new THREE.Mesh(new THREE.BoxGeometry(w, h, w), i % 2 === 0 ? mtMat : mtMat2);
  const a = (i / 18) * Math.PI * 2;
  mt.position.set(Math.cos(a) * 130, h / 2 - 0.5, Math.sin(a) * 130);
  scene.add(mt);
}

// ── SQUARE ICE ARENA ──────────────────────────────────────────────────────
const arenaGroup = new THREE.Group();
arenaGroup.position.set(ARENA_CX, 0, ARENA_CZ);
scene.add(arenaGroup);

const iceMat  = new THREE.MeshStandardMaterial({ color: 0x9eeeff, roughness: 0.15, metalness: 0.05, transparent: true, opacity: 0.94 });
const iceSide = new THREE.MeshStandardMaterial({ color: 0x0ea5c8, roughness: 0.35, metalness: 0.02 });

// Main ice block (square)
const sz = ARENA_HALF * 2;
const arenaSlab = new THREE.Mesh(new THREE.BoxGeometry(sz, 1.4, sz), iceSide);
arenaSlab.position.y = -0.72; arenaSlab.receiveShadow = true;
arenaGroup.add(arenaSlab);

const arenaTop = new THREE.Mesh(new THREE.BoxGeometry(sz + 0.1, 0.08, sz + 0.1), iceMat);
arenaTop.position.y = 0.02; arenaTop.receiveShadow = true;
arenaGroup.add(arenaTop);

// Ice cracks
for (let i = 0; i < 28; i++) {
  const len = 1.5 + Math.random() * 3.5;
  const crack = new THREE.Mesh(new THREE.BoxGeometry(len, 0.018, 0.03),
    new THREE.MeshBasicMaterial({ color: 0x0e7490, transparent: true, opacity: 0.3 }));
  crack.position.set(
    (Math.random() - 0.5) * (sz - 2),
    0.2,
    (Math.random() - 0.5) * (sz - 2)
  );
  crack.rotation.y = Math.random() * Math.PI;
  arenaGroup.add(crack);
}

// Corner pillars
const pillarMat = new THREE.MeshStandardMaterial({ color: 0x5ac8e0, roughness: 0.3 });
for (const [cx, cz] of [[-1,-1],[-1,1],[1,-1],[1,1]]) {
  const p = new THREE.Mesh(new THREE.BoxGeometry(1, 2.5, 1), pillarMat);
  p.position.set(cx * (ARENA_HALF + 0.5), 1.0, cz * (ARENA_HALF + 0.5));
  arenaGroup.add(p);
}

// ── LOBBY AREA ────────────────────────────────────────────────────────────
const lobbyGroup = new THREE.Group();
lobbyGroup.position.set(LOBBY_CX, 0, LOBBY_CZ);
scene.add(lobbyGroup);

// Lobby ground (slightly elevated snow pad)
const lobbyGround = new THREE.Mesh(new THREE.BoxGeometry(80, 0.3, 80),
  new THREE.MeshStandardMaterial({ color: 0xdcf0ff, roughness: 0.85 }));
lobbyGround.position.y = -0.12; lobbyGround.receiveShadow = true;
lobbyGroup.add(lobbyGround);

// Sign post in lobby showing "LOBBY"
const signPost = new THREE.Group();
signPost.position.set(0, 0, -28);
lobbyGroup.add(signPost);
const postMat = new THREE.MeshStandardMaterial({ color: 0x8b5e3c, roughness: 0.9 });
const post = new THREE.Mesh(new THREE.BoxGeometry(0.2, 4, 0.2), postMat);
post.position.y = 2; signPost.add(post);
const signBoard = new THREE.Mesh(new THREE.BoxGeometry(5, 1.2, 0.2),
  new THREE.MeshStandardMaterial({ color: 0xfbbf24, roughness: 0.6 }));
signBoard.position.y = 4.2; signPost.add(signBoard);

// Decorative ice pillars in lobby
const lobbyPillarMat = new THREE.MeshStandardMaterial({ color: 0x7dd3fc, roughness: 0.25, transparent: true, opacity: 0.85 });
const lobbyPillarPos = [[-20,-20],[-20,20],[20,-20],[20,20],[-28,0],[28,0],[0,28],[0,-28]];
for (const [px, pz] of lobbyPillarPos) {
  const h = 2 + Math.random() * 3;
  const lp = new THREE.Mesh(new THREE.BoxGeometry(1.2, h, 1.2), lobbyPillarMat);
  lp.position.set(px, h / 2, pz);
  lobbyGroup.add(lp);
}

// ── CAMERA ────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(78, innerWidth / innerHeight, 0.05, 400);
let camYaw = 0;
let camDist = 10;
let dragging = false, lastMouseX = 0;

canvas.addEventListener('mousedown', e => { dragging = true; lastMouseX = e.clientX; });
window.addEventListener('mouseup',   () => { dragging = false; });
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  camYaw -= (e.clientX - lastMouseX) * 0.005;
  lastMouseX = e.clientX;
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  camDist = Math.max(3, Math.min(20, camDist + e.deltaY * 0.04));
}, { passive: false });

// Touch camera
let touchX = 0;
canvas.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
canvas.addEventListener('touchmove',  e => {
  e.preventDefault();
  camYaw -= (e.touches[0].clientX - touchX) * 0.004;
  touchX = e.touches[0].clientX;
}, { passive: false });

// ── HUMAN AVATAR FACTORY ──────────────────────────────────────────────────
const SKIN = new THREE.MeshStandardMaterial({ color: 0xf5c5a3, roughness: 0.75 });
const SHIRT = new THREE.MeshStandardMaterial({ color: 0x2563eb, roughness: 0.7 });
const JEANS = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.8 });
const HAIR_MAT = new THREE.MeshStandardMaterial({ color: 0x5c3317, roughness: 0.85 });
const DARK = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.4 });
const SHOE = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });

function makeHuman(bodyColor, hairColor) {
  const skinMat  = bodyColor  ? new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.75 }) : SKIN;
  const hairMat  = hairColor  ? new THREE.MeshStandardMaterial({ color: hairColor, roughness: 0.85 }) : HAIR_MAT;

  const g = new THREE.Group();

  // Torso
  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.62, 0.28), SHIRT);
  torso.position.y = 0.95; torso.castShadow = true; g.add(torso);

  // Head
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.46, 0.46, 0.46), skinMat);
  head.position.y = 1.52; head.castShadow = true; g.add(head);

  // Hair (blocky top layer)
  const hairTop = new THREE.Mesh(new THREE.BoxGeometry(0.48, 0.18, 0.48), hairMat);
  hairTop.position.y = 1.84; g.add(hairTop);
  // Hair side flop
  const hairFront = new THREE.Mesh(new THREE.BoxGeometry(0.44, 0.1, 0.12), hairMat);
  hairFront.position.set(0, 1.76, 0.26); g.add(hairFront);

  // Eyes
  for (const s of [-1, 1]) {
    const eye = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.04), DARK);
    eye.position.set(s * 0.1, 1.54, 0.245); g.add(eye);
  }
  // Smile
  const smile = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.04, 0.04), DARK);
  smile.position.set(0, 1.38, 0.245); g.add(smile);

  // Arms (pivot groups so we can animate them)
  const leftArmPivot = new THREE.Group();
  leftArmPivot.position.set(-0.32, 1.22, 0);
  const leftArmMesh = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.52, 0.16), skinMat);
  leftArmMesh.position.y = -0.26; leftArmMesh.castShadow = true;
  leftArmPivot.add(leftArmMesh);
  g.add(leftArmPivot);
  g.userData.leftArm = leftArmPivot;

  const rightArmPivot = new THREE.Group();
  rightArmPivot.position.set(0.32, 1.22, 0);
  const rightArmMesh = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.52, 0.16), skinMat);
  rightArmMesh.position.y = -0.26; rightArmMesh.castShadow = true;
  rightArmPivot.add(rightArmMesh);
  g.add(rightArmPivot);
  g.userData.rightArm = rightArmPivot;

  // Legs (pivot at hip)
  const leftLegPivot = new THREE.Group();
  leftLegPivot.position.set(-0.135, 0.64, 0);
  const leftLegMesh = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.56, 0.18), JEANS);
  leftLegMesh.position.y = -0.28; leftLegMesh.castShadow = true;
  leftLegPivot.add(leftLegMesh);
  // Shoe
  const leftShoe = new THREE.Mesh(new THREE.BoxGeometry(0.19, 0.1, 0.26), SHOE);
  leftShoe.position.set(0, -0.59, 0.04); leftLegPivot.add(leftShoe);
  g.add(leftLegPivot);
  g.userData.leftLeg = leftLegPivot;

  const rightLegPivot = new THREE.Group();
  rightLegPivot.position.set(0.135, 0.64, 0);
  const rightLegMesh = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.56, 0.18), JEANS);
  rightLegMesh.position.y = -0.28; rightLegMesh.castShadow = true;
  rightLegPivot.add(rightLegMesh);
  const rightShoe = new THREE.Mesh(new THREE.BoxGeometry(0.19, 0.1, 0.26), SHOE);
  rightShoe.position.set(0, -0.59, 0.04); rightLegPivot.add(rightShoe);
  g.add(rightLegPivot);
  g.userData.rightLeg = rightLegPivot;

  return g;
}

// ── PENGUIN FACTORY ───────────────────────────────────────────────────────
function makePenguin(bodyColor = 0x111111, bellyColor = 0xd8e8ee) {
  const g = new THREE.Group();
  const bodyMat  = new THREE.MeshStandardMaterial({ color: bodyColor,  roughness: 0.7 });
  const bellyMat = new THREE.MeshStandardMaterial({ color: bellyColor, roughness: 0.55 });
  const yellow   = new THREE.MeshStandardMaterial({ color: 0xf5c000,   roughness: 0.5 });
  const dark     = new THREE.MeshStandardMaterial({ color: 0x080808,   roughness: 0.3 });

  const body = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.88, 0.62), bodyMat);
  body.position.y = 0.44; body.castShadow = true; g.add(body);
  const belly = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.68, 0.04), bellyMat);
  belly.position.set(0, 0.44, 0.32); g.add(belly);
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.68, 0.58, 0.58), bodyMat);
  head.position.y = 1.13; head.castShadow = true; g.add(head);
  const face = new THREE.Mesh(new THREE.BoxGeometry(0.46, 0.42, 0.04), bellyMat);
  face.position.set(0, 1.16, 0.3); g.add(face);
  const beak = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.13, 0.1), yellow);
  beak.position.set(0, 1.02, 0.33); g.add(beak);
  for (const s of [-1, 1]) {
    const eye = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.09, 0.04), dark);
    eye.position.set(s * 0.12, 1.24, 0.34); g.add(eye);
  }
  for (const s of [-1, 1]) {
    const fl = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.58, 0.26), bodyMat);
    fl.position.set(s * 0.43, 0.5, -0.02);
    fl.rotation.z = s * 0.12; fl.castShadow = true; g.add(fl);
  }
  for (const s of [-1, 1]) {
    const foot = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.09, 0.36), yellow);
    foot.position.set(s * 0.17, 0.045, 0.08); g.add(foot);
  }
  return g;
}

// ── ANIMATE HUMAN WALK ────────────────────────────────────────────────────
function animateHumanWalk(human, walkT, isMoving, isJumping) {
  const { leftArm, rightArm, leftLeg, rightLeg } = human.userData;
  if (isJumping) {
    leftLeg.rotation.x  = -0.45;
    rightLeg.rotation.x = -0.45;
    leftArm.rotation.x  =  0.6;
    rightArm.rotation.x =  0.6;
  } else if (isMoving) {
    const swing = Math.sin(walkT * 5.5) * 0.55;
    leftLeg.rotation.x  =  swing;
    rightLeg.rotation.x = -swing;
    leftArm.rotation.x  = -swing * 0.5;
    rightArm.rotation.x =  swing * 0.5;
  } else {
    leftLeg.rotation.x  += (0 - leftLeg.rotation.x)  * 0.18;
    rightLeg.rotation.x += (0 - rightLeg.rotation.x) * 0.18;
    leftArm.rotation.x  += (0 - leftArm.rotation.x)  * 0.18;
    rightArm.rotation.x += (0 - rightArm.rotation.x) * 0.18;
  }
}

// ── ARENA: LAUNCH ─────────────────────────────────────────────────────────
function launchPenguin() {
  const facing = aimLocked ? lockedFacing : penguinFacing;
  penguinVel.x = -Math.sin(facing) * (1.5 + power * 2);
  penguinVel.z =  Math.cos(facing) * (1.5 + power * 2);
  if (aimLocked) { aimLocked = false; aimLockBtn.textContent = '🎯 Aim Lock'; aimLockBtn.classList.remove('active'); }
}

function aiPrepare(i) {
  aiPower[i] = Math.ceil(Math.random() * 10);
  const tpX = penguinPos.x - aiPos[i].x, tpZ = penguinPos.z - aiPos[i].z;
  const tpLen = Math.sqrt(tpX**2 + tpZ**2);
  let dx = tpLen > 0.5 ? tpX/tpLen : 0, dz = tpLen > 0.5 ? tpZ/tpLen : -1;
  const dfc = Math.sqrt((aiPos[i].x-ARENA_CX)**2 + (aiPos[i].z-ARENA_CZ)**2);
  const eth = ARENA_HALF * 0.55;
  if (dfc > eth) {
    const w = Math.min(1, (dfc - eth)/(ARENA_HALF - eth));
    dx = dx*(1-w) + (-aiPos[i].x/Math.max(0.01,dfc))*w;
    dz = dz*(1-w) + (-aiPos[i].z/Math.max(0.01,dfc))*w;
    const l = Math.sqrt(dx**2+dz**2)||1; dx/=l; dz/=l;
    aiPower[i] = Math.min(aiPower[i],4);
  }
  aiLockedDX[i]=dx; aiLockedDZ[i]=dz;
  aiFacing[i] = Math.atan2(-dx, dz);
  const arr = aiArrows[i];
  arr.position.set(aiPos[i].x, 0.12, aiPos[i].z);
  arr.setDirection(new THREE.Vector3(-Math.sin(aiFacing[i]), 0, Math.cos(aiFacing[i])));
  const al = aiPower[i]*1.1;
  arr.setLength(al, Math.max(0.3,al*0.18), Math.max(0.18,al*0.1));
  arr.visible = true;
}

function aiExecute(i) {
  const f = 1.5 + aiPower[i]*2;
  aiVel[i].x = aiLockedDX[i]*f; aiVel[i].z = aiLockedDZ[i]*f;
  aiArrows[i].visible = false;
}

function resolveCollision(posA, velA, posB, velB) {
  const dx = posB.x-posA.x, dz = posB.z-posA.z;
  const dist = Math.sqrt(dx*dx+dz*dz), R = 1.1;
  if (dist >= R || dist < 0.001) return;
  const nx=dx/dist, nz=dz/dist;
  const vn = (velA.x-velB.x)*nx + (velA.z-velB.z)*nz;
  if (vn > 0) { velA.x-=vn*nx; velA.z-=vn*nz; velB.x+=vn*nx; velB.z+=vn*nz; }
  const ov = (R-dist)/2;
  posA.x-=nx*ov; posA.z-=nz*ov; posB.x+=nx*ov; posB.z+=nz*ov;
}

// Square boundary check for arena
function inArena(x, z) {
  return Math.abs(x - ARENA_CX) < FALL_EDGE && Math.abs(z - ARENA_CZ) < FALL_EDGE;
}
function clampToWall(pos, vel) {
  const lx = pos.x - ARENA_CX, lz = pos.z - ARENA_CZ;
  if (Math.abs(lx) > WALL_INNER) {
    const nx = Math.sign(lx); const dot = vel.x*nx;
    if (dot > 0) vel.x -= dot*nx;
    pos.x = ARENA_CX + nx*WALL_INNER;
  }
  if (Math.abs(lz) > WALL_INNER) {
    const nz = Math.sign(lz); const dot = vel.z*nz;
    if (dot > 0) vel.z -= dot*nz;
    pos.z = ARENA_CZ + nz*WALL_INNER;
  }
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────
let last = performance.now();

function loop(now) {
  requestAnimationFrame(loop);
  const dt = Math.min(0.05, (now-last)/1000);
  last = now;

  // ── LOBBY PHASE ──────────────────────────────────────────────────────
  if (phase === 'lobby') {
    // Player movement (WASD)
    const moveX = (keys['KeyD']||keys['ArrowRight'] ? 1 : 0) - (keys['KeyA']||keys['ArrowLeft'] ? 1 : 0);
    const moveZ = (keys['KeyS']||keys['ArrowDown']  ? 1 : 0) - (keys['KeyW']||keys['ArrowUp']   ? 1 : 0);
    playerMoving = moveX !== 0 || moveZ !== 0;

    if (playerMoving) {
      // Relative to camera yaw
      const wx = moveX * Math.cos(camYaw) + moveZ * Math.sin(camYaw);
      const wz = moveZ * Math.cos(camYaw) - moveX * Math.sin(camYaw);
      const len = Math.sqrt(wx*wx+wz*wz)||1;
      const speed = 6;
      playerVelXZ.x = (wx/len)*speed;
      playerVelXZ.y = (wz/len)*speed;
      playerFacing = Math.atan2(-wx/len, wz/len);
    } else {
      playerVelXZ.x *= 0.82; playerVelXZ.y *= 0.82;
    }

    playerPos.x += playerVelXZ.x * dt;
    playerPos.z += playerVelXZ.y * dt;
    // Clamp to lobby bounds
    playerPos.x = Math.max(LOBBY_CX-36, Math.min(LOBBY_CX+36, playerPos.x));
    playerPos.z = Math.max(LOBBY_CZ-36, Math.min(LOBBY_CZ+36, playerPos.z));

    // Jump physics
    if (!playerOnGround) {
      playerJumpVel -= 22 * dt;
      playerPos.y += playerJumpVel * dt;
      if (playerPos.y <= 0) { playerPos.y = 0; playerJumpVel = 0; playerOnGround = true; }
    }

    playerHuman.position.copy(playerPos);
    playerHuman.rotation.y = playerFacing;

    if (playerMoving) playerWalkT += dt;
    animateHumanWalk(playerHuman, playerWalkT, playerMoving, !playerOnGround);

    // NPC AI
    for (const npc of npcs) {
      npc.targetTimer -= dt;
      if (npc.targetTimer <= 0) {
        npc.target.set(LOBBY_CX + (Math.random()-0.5)*42, 0, LOBBY_CZ + (Math.random()-0.5)*42);
        npc.targetTimer = 3 + Math.random()*4;
        // Occasional jump
        if (Math.random() < 0.25 && npc.onGround) { npc.jumpVel = 7; npc.onGround = false; npc.jumping = true; }
      }
      const dx = npc.target.x - npc.pos.x, dz = npc.target.z - npc.pos.z;
      const dist = Math.sqrt(dx*dx+dz*dz);
      const npcMoving = dist > 1.5;
      if (npcMoving) {
        const s = 3.5; npc.vel.set(dx/dist*s, dz/dist*s);
        npc.facing = Math.atan2(-dx/dist, dz/dist);
      } else { npc.vel.multiplyScalar(0.8); }
      npc.pos.x += npc.vel.x*dt; npc.pos.z += npc.vel.y*dt;
      // Jump
      if (!npc.onGround) {
        npc.jumpVel -= 22*dt; npc.pos.y += npc.jumpVel*dt;
        if (npc.pos.y <= 0) { npc.pos.y=0; npc.jumpVel=0; npc.onGround=true; npc.jumping=false; }
      }
      npc.mesh.position.set(npc.pos.x, npc.pos.y, npc.pos.z);
      npc.mesh.rotation.y = npc.facing;
      npc.walkT += dt;
      animateHumanWalk(npc.mesh, npc.walkT, npcMoving, npc.jumping);
    }

    // Spawn indicators gently bob
    spawnIndicators.forEach((s, i) => {
      s.position.y = Math.sin(now/800 + i*1.2) * 0.08;
    });

    // Lobby countdown
    lobbyCountdown -= dt;
    const secs = Math.max(0, Math.ceil(lobbyCountdown));
    lcText.textContent = `Launching in ${secs}`;
    lcPill.classList.toggle('urgent', secs <= 5);

    if (lobbyCountdown <= 0) {
      if (!isAfk) {
        enterArena();
      } else {
        // Reset countdown, player stays in lobby
        lobbyCountdown = LOBBY_COUNTDOWN_START;
        lcPill.classList.remove('urgent');
      }
    }

    // Camera follows player human
    const tx = playerPos.x - Math.sin(camYaw)*camDist;
    const ty = camDist*0.52 + 1.2;
    const tz = playerPos.z + Math.cos(camYaw)*camDist;
    camera.position.x += (tx-camera.position.x)*Math.min(1, 7*dt);
    camera.position.y += (ty-camera.position.y)*Math.min(1, 7*dt);
    camera.position.z += (tz-camera.position.z)*Math.min(1, 7*dt);
    camera.lookAt(playerPos.x, playerPos.y + 0.9, playerPos.z);
  }

  // ── TRANSITION: LOBBY → ARENA ────────────────────────────────────────
  else if (phase === 'transitioning_in') {
    transitionTimer -= dt;
    const t = 1 - Math.max(0, transitionTimer/TRANSITION_DURATION);
    // Camera sweeps to arena
    const lobbyLookX = playerPos.x, lobbyLookZ = playerPos.z;
    const arenaLookX = ARENA_CX, arenaLookZ = ARENA_CZ;
    const lookX = lobbyLookX + (arenaLookX - lobbyLookX)*t;
    const lookZ = lobbyLookZ + (arenaLookZ - lobbyLookZ)*t;
    const armX = lookX - Math.sin(camYaw)*camDist;
    const armZ = lookZ + Math.cos(camYaw)*camDist;
    camera.position.x += (armX-camera.position.x)*Math.min(1, 4*dt);
    camera.position.y += (9 - camera.position.y)*Math.min(1, 4*dt);
    camera.position.z += (armZ-camera.position.z)*Math.min(1, 4*dt);
    camera.lookAt(lookX, 0.8, lookZ);
    if (transitionTimer <= 0) activateArena();
  }

  // ── ARENA PHASE ──────────────────────────────────────────────────────
  else if (phase === 'arena') {
    const ICE = Math.pow(0.978, dt*60);

    // Arena countdown
    if (launchPending) {
      launchDelay -= dt;
      countdownText.textContent = 'Revealing aims…';
      countdownPill.classList.add('go');
      if (launchDelay <= 0) {
        launchPenguin();
        for (let i=0;i<AI_COUNT;i++) aiExecute(i);
        launchPending = false; arenaCountdown = ARENA_COUNTDOWN_START;
      }
    } else {
      arenaCountdown -= dt;
      if (arenaCountdown <= 0) {
        launchPending = true; launchDelay = 1.5;
        if (!aimLocked) { aimLocked=true; lockedFacing=penguinFacing; aimLockBtn.textContent='🔒 Aim Locked'; aimLockBtn.classList.add('active'); }
        for (let i=0;i<AI_COUNT;i++) aiPrepare(i);
      }
      const sc = Math.ceil(Math.max(1, arenaCountdown));
      countdownText.textContent = `Launching in ${sc}`;
      countdownPill.classList.toggle('go', sc <= 3);
    }

    // Penguin physics
    penguinVel.x *= ICE; penguinVel.z *= ICE;
    penguinPos.x += penguinVel.x*dt; penguinPos.z += penguinVel.z*dt;

    if (!inArena(penguinPos.x, penguinPos.z)) {
      // Player fell off → back to lobby
      enterLobby();
      return renderer.render(scene, camera);
    }
    clampToWall(penguinPos, penguinVel);

    // Player facing
    if (!aimLocked) {
      const tf = camYaw + Math.PI;
      const d = ((tf - penguinFacing) % (Math.PI*2) + Math.PI*3) % (Math.PI*2) - Math.PI;
      penguinFacing += d * Math.min(1, 5*dt);
    }
    playerPenguin.position.set(penguinPos.x, 0, penguinPos.z);
    playerPenguin.rotation.y = aimLocked ? lockedFacing : penguinFacing;

    // Arrow
    const af = aimLocked ? lockedFacing : penguinFacing;
    const aLen = power*1.1;
    arrowDir.set(-Math.sin(af), 0, Math.cos(af));
    arrowOrigin.set(penguinPos.x, 0.12, penguinPos.z);
    arrowHelper.position.copy(arrowOrigin);
    arrowHelper.setDirection(arrowDir);
    arrowHelper.setLength(aLen, Math.max(0.3,aLen*0.18), Math.max(0.18,aLen*0.1));

    // AI physics
    for (let i=0;i<AI_COUNT;i++) {
      aiVel[i].x *= ICE; aiVel[i].z *= ICE;
      aiPos[i].x += aiVel[i].x*dt; aiPos[i].z += aiVel[i].z*dt;
      if (!inArena(aiPos[i].x, aiPos[i].z)) {
        const angle=(i/AI_COUNT)*Math.PI*2, r=ARENA_HALF*0.45;
        aiPos[i].set(ARENA_CX+Math.cos(angle)*r, 0, ARENA_CZ+Math.sin(angle)*r);
        aiVel[i].set(0,0,0);
      } else {
        clampToWall(aiPos[i], aiVel[i]);
      }
      const spd=Math.sqrt(aiVel[i].x**2+aiVel[i].z**2);
      if (spd > 0.5) {
        const mf=Math.atan2(-aiVel[i].x, aiVel[i].z);
        const df=((mf-aiFacing[i])%(Math.PI*2)+Math.PI*3)%(Math.PI*2)-Math.PI;
        aiFacing[i]+=df*Math.min(1,8*dt);
      }
      aiPenguins[i].position.copy(aiPos[i]);
      aiPenguins[i].rotation.y = aiFacing[i];
    }
    // Collisions
    for (let i=0;i<AI_COUNT;i++) resolveCollision(penguinPos, penguinVel, aiPos[i], aiVel[i]);
    for (let i=0;i<AI_COUNT;i++) for (let j=i+1;j<AI_COUNT;j++) resolveCollision(aiPos[i],aiVel[i],aiPos[j],aiVel[j]);

    // Camera follows penguin
    const px=penguinPos.x, pz=penguinPos.z;
    if (camDist < 0.5) {
      camera.position.set(px, 1.55, pz);
      camera.rotation.order='YXZ'; camera.rotation.y=-camYaw; camera.rotation.x=-0.1;
      playerPenguin.visible=false;
    } else {
      playerPenguin.visible=true;
      const ax=px-Math.sin(camYaw)*camDist;
      const ay=camDist*0.55+1.5;
      const az=pz+Math.cos(camYaw)*camDist;
      camera.position.x+=(ax-camera.position.x)*Math.min(1,8*dt);
      camera.position.y+=(ay-camera.position.y)*Math.min(1,8*dt);
      camera.position.z+=(az-camera.position.z)*Math.min(1,8*dt);
      camera.lookAt(px, 0.8, pz);
    }
  }

  // ── TRANSITION: ARENA → LOBBY ────────────────────────────────────────
  else if (phase === 'transitioning_out') {
    transitionTimer -= dt;
    const t = 1 - Math.max(0, transitionTimer/TRANSITION_DURATION);
    const ax = ARENA_CX, az = ARENA_CZ;
    const lx = LOBBY_CX, lz = LOBBY_CZ;
    const lookX = ax + (lx-ax)*t, lookZ = az + (lz-az)*t;
    const armX = lookX - Math.sin(camYaw)*camDist;
    const armZ = lookZ + Math.cos(camYaw)*camDist;
    camera.position.x += (armX-camera.position.x)*Math.min(1, 4*dt);
    camera.position.y += (9 - camera.position.y)*Math.min(1, 4*dt);
    camera.position.z += (armZ-camera.position.z)*Math.min(1, 4*dt);
    camera.lookAt(lookX, 0.8, lookZ);
    if (transitionTimer <= 0) activateLobby();
  }

  renderer.render(scene, camera);
}

// ── INIT ──────────────────────────────────────────────────────────────────
// Start in lobby
npcs.forEach(n => n.mesh.visible = true);
spawnIndicators.forEach(s => s.visible = true);
camera.position.set(LOBBY_CX - Math.sin(camYaw)*camDist, camDist*0.52+1.2, LOBBY_CZ + Math.cos(camYaw)*camDist);
camera.lookAt(LOBBY_CX, 0.9, LOBBY_CZ);

requestAnimationFrame(loop);
</script>
