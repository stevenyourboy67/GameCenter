<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Soccer Random (but terrbile) — GameCenter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #07090f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            color: #e8e8f4;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 820px;
            padding: 10px 4px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #64748b;
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 8px;
            transition: color 0.2s;
        }
        .back-btn:hover { color: #e2e8f0; }

        .game-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            color: #fff;
        }

        .controls-hint {
            font-size: 0.75rem;
            color: #374151;
        }

        #canvas {
            border-radius: 12px;
            display: block;
            max-width: 100%;
        }

        .key-guide {
            display: flex;
            gap: 32px;
            margin-top: 10px;
            font-size: 0.78rem;
            color: #374151;
        }

        .key-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .key {
            background: #1e2030;
            border: 1px solid #374151;
            border-radius: 5px;
            padding: 3px 8px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <a href="/dashboard.html" class="back-btn">← GameCenter</a>
    <div class="game-title">⚽ Soccer Random(but terrible)</div>
    <div class="controls-hint">First to 5 wins!</div>
</div>

<canvas id="canvas" width="800" height="430"></canvas>

<div class="key-guide">
    <div class="key-group">
        <div style="width:12px;height:12px;border-radius:50%;background:#4f8ef7;"></div>
        <span style="color:#94a3b8;">Player 1</span>
        <span class="key">W</span>
    </div>
    <div class="key-group">
        <div style="width:12px;height:12px;border-radius:50%;background:#f74f4f;"></div>
        <span style="color:#94a3b8;">Player 2</span>
        <span class="key">↑</span>
    </div>
    <div class="key-group">
        <span style="color:#64748b;">Mobile: Tap left / right half</span>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// Scale canvas for retina
const dpr = window.devicePixelRatio || 1;
canvas.width = W * dpr; canvas.height = H * dpr;
canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
ctx.scale(dpr, dpr);

// ── Constants ──────────────────────────────────────────
const GROUND = H - 55;
const GOAL_H = 115;
const GOAL_POST = 52;   // x position of goal posts from edge
const PLAYER_R = 26;
const WIN_SCORE = 5;
const LEG_LEN = 28;

// ── Conditions ─────────────────────────────────────────
const CONDITIONS = [
    { name: 'Normal',     sky:'#3a6b3a', ground:'#2d5a2d', glow:'#4ade80', friction:0.84, gravity:0.55, bounce:0.65, wind:0, ballR:20, snow:false, rain:false, stars:false, bouncy:false },
    { name: '❄ Snow',    sky:'#b8cfe0', ground:'#d4e8f5', glow:'#93c5fd', friction:0.93, gravity:0.55, bounce:0.55, wind:0, ballR:20, snow:true,  rain:false, stars:false, bouncy:false },
    { name: '🌧 Rain',   sky:'#1e2a38', ground:'#273a28', glow:'#60a5fa', friction:0.78, gravity:0.70, bounce:0.60, wind:0, ballR:20, snow:false, rain:true,  stars:false, bouncy:false },
    { name: '💨 Wind ›', sky:'#3a6b3a', ground:'#2d5a2d', glow:'#fbbf24', friction:0.84, gravity:0.55, bounce:0.65, wind:0.28, ballR:20, snow:false, rain:false, stars:false, bouncy:false },
    { name: '‹ Wind 💨', sky:'#3a6b3a', ground:'#2d5a2d', glow:'#fbbf24', friction:0.84, gravity:0.55, bounce:0.65, wind:-0.28, ballR:20, snow:false, rain:false, stars:false, bouncy:false },
    { name: '🌙 Night',  sky:'#0d1b2a', ground:'#0d1f0d', glow:'#818cf8', friction:0.84, gravity:0.55, bounce:0.65, wind:0, ballR:20, snow:false, rain:false, stars:true,  bouncy:false },
    { name: '⚡ Bouncy', sky:'#3a2a5a', ground:'#2a1a4a', glow:'#c084fc', friction:0.84, gravity:0.55, bounce:0.92, wind:0, ballR:20, snow:false, rain:false, stars:false, bouncy:true  },
    { name: '🏈 Big Ball',sky:'#3a6b3a', ground:'#2d5a2d', glow:'#fb923c', friction:0.84, gravity:0.55, bounce:0.65, wind:0, ballR:34, snow:false, rain:false, stars:false, bouncy:false },
    { name: '🔮 Tiny',   sky:'#3a6b3a', ground:'#2d5a2d', glow:'#f472b6', friction:0.84, gravity:0.55, bounce:0.65, wind:0, ballR:11, snow:false, rain:false, stars:false, bouncy:false },
    { name: '🧊 Ice',    sky:'#c0d8f0', ground:'#c8e8ff', glow:'#38bdf8', friction:0.98, gravity:0.55, bounce:0.70, wind:0, ballR:20, snow:false, rain:false, stars:false, bouncy:false },
];

// ── State ──────────────────────────────────────────────
let cond = CONDITIONS[0];
let particles = [];
let stars = [];
let goalTimer = 0;
let goalSide = null;
let winSide = null;
let gameState = 'playing'; // 'playing' | 'goal' | 'win'
let roundConditionName = '';
let showConditionTimer = 0;
let frameCount = 0;

// ── Ball ───────────────────────────────────────────────
let ball = {};

function resetBall() {
    ball = {
        x: W / 2, y: GROUND - 200,
        vx: (Math.random() - 0.5) * 3,
        vy: 0,
        r: cond.ballR,
        spin: 0
    };
}

// ── Player ─────────────────────────────────────────────
const TEAM_COLORS = {
    left:  ['#4f8ef7', '#82b4ff'],
    right: ['#f74f4f', '#ff8f8f'],
};

function makePlayer(side, xPos, num) {
    return {
        x: xPos,
        y: GROUND - PLAYER_R,
        vx: 0, vy: 0,
        angle: 0,
        angVel: 0,
        onGround: false,
        kicking: false,
        kickTimer: 0,
        side,
        score: 0,
        color: TEAM_COLORS[side][num - 1],
        jumpPressed: false,
        justJumped: false,
        jumpCooldown: 0,
        groundedTimer: 0,
        landSmooth: 0,
        number: num,
    };
}

let p1  = makePlayer('left',    110, 1);
let p1b = makePlayer('left',    195, 2);
let p2  = makePlayer('right', W-110, 1);
let p2b = makePlayer('right', W-195, 2);

function resetPlayers() {
    const s1 = p1.score, s2 = p2.score;
    p1  = makePlayer('left',    110, 1);
    p1b = makePlayer('left',    195, 2);
    p2  = makePlayer('right', W-110, 1);
    p2b = makePlayer('right', W-195, 2);
    p1.score = s1; p2.score = s2;
}

// ── Input ──────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
    const k = e.key;
    if ((k === 'w' || k === 'W') && !keys[k]) { keys[k] = true; p1.jumpPressed = true; p1b.jumpPressed = true; }
    if (k === 'ArrowUp' && !keys[k]) { keys[k] = true; p2.jumpPressed = true; p2b.jumpPressed = true; }
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(k)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch controls
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
        const rect = canvas.getBoundingClientRect();
        const tx = t.clientX - rect.left;
        if (tx < W / 2) { p1.jumpPressed = true; p1b.jumpPressed = true; }
        else { p2.jumpPressed = true; p2b.jumpPressed = true; }
    }
}, { passive: false });

// Click controls for desktop testing
canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    if (gameState === 'win') { newGame(); return; }
    if (mx < W / 2) { p1.jumpPressed = true; p1b.jumpPressed = true; }
    else { p2.jumpPressed = true; p2b.jumpPressed = true; }
});

// ── Particle system ─────────────────────────────────────
function spawnParticles() {
    if (cond.snow && Math.random() < 0.5) {
        particles.push({ x: Math.random() * W, y: -10, vx: (Math.random()-0.5)*0.5 + (cond.wind||0)*0.5, vy: Math.random()*1+0.5, r: Math.random()*4+1, alpha: 1, type:'snow' });
    }
    if (cond.rain && Math.random() < 0.8) {
        particles.push({ x: Math.random() * W, y: -10, vx: -1 + (cond.wind||0), vy: Math.random()*8+8, r: 1, alpha: 0.7, type:'rain' });
    }
}

function updateParticles() {
    spawnParticles();
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        if (p.y > GROUND || p.x < -20 || p.x > W + 20) particles.splice(i, 1);
    }
}

// ── Stars ──────────────────────────────────────────────
function generateStars() {
    stars = [];
    for (let i = 0; i < 60; i++) {
        stars.push({ x: Math.random()*W, y: Math.random()*(GROUND-60), r: Math.random()*1.5+0.3, twinkle: Math.random()*Math.PI*2 });
    }
}

// ── Physics helpers ─────────────────────────────────────
function playerUpdate(p) {
    if (p.jumpCooldown > 0) p.jumpCooldown--;

    if (p.jumpPressed) {
        p.jumpPressed = false;
        if (p.jumpCooldown === 0 && p.onGround) {
            p.vy = -6.5;
            p.onGround = false;
            p.vx += -Math.sin(p.angle) * 6;
            p.jumpCooldown = 18;
            // Clean launch angle — no mid-wobble spike
            p.angle = 0;
            p.angVel = p.side === 'left' ? 0.18 : -0.18;
        }
    }

    // Gravity
    p.vy += cond.gravity;

    // Wind
    p.vx += cond.wind * 0.15;

    // Integrate
    p.x += p.vx;
    p.y += p.vy;

    // Ground
    if (p.y + PLAYER_R >= GROUND) {
        p.y = GROUND - PLAYER_R;
        p.vy *= -0.2;
        p.vx *= cond.friction;

        if (!p.onGround && p.vy < -0.3) {
            // Real landing — start smooth settle before wobble
            p.landSmooth = 5;
            p.angVel = 0;
        }

        if (p.landSmooth > 0) {
            // Exponentially decay angle toward upright over several frames
            p.landSmooth--;
            p.angle *= 0.45;
            if (p.landSmooth === 0) {
                // Angle is now near zero — launch the clean wobble
                p.angle = 0;
                p.angVel = p.side === 'left' ? 0.27 : -0.27;
            }
        } else {
            // Spring pulls back to upright — full 180° pendulum, natural decay
            p.angVel -= p.angle * 0.007;
        }

        p.angle = Math.max(-Math.PI, Math.min(Math.PI, p.angle));

        p.onGround = true;
    } else {
        p.onGround = false;
        // Very gentle upright nudge in the air
        p.angVel -= p.angle * 0.015;
    }

    // Walls
    // Only block at canvas edges — players can walk into goal posts freely
    if (p.x - PLAYER_R < 2) { p.x = PLAYER_R + 2; p.vx *= -0.4; }
    if (p.x + PLAYER_R > W - 2) { p.x = W - 2 - PLAYER_R; p.vx *= -0.4; }

    // Ceiling
    if (p.y - PLAYER_R < 0) { p.y = PLAYER_R; p.vy *= -0.5; }

    // Angle — clamp to ±180° at all times, never a full 360°
    p.angle += p.angVel;
    if (p.angle > Math.PI)  { p.angle = Math.PI;  p.angVel *= -0.3; }
    if (p.angle < -Math.PI) { p.angle = -Math.PI; p.angVel *= -0.3; }
    p.angVel *= 0.994;

    // Kick timer
    if (p.kicking) {
        p.kickTimer--;
        if (p.kickTimer <= 0) p.kicking = false;
    }
}

function ballUpdate() {
    ball.vy += cond.gravity;
    ball.vx += cond.wind;
    ball.vx *= 0.995;
    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.spin += ball.vx * 0.04;

    // Ground bounce
    if (ball.y + ball.r >= GROUND) {
        ball.y = GROUND - ball.r;
        ball.vy *= -cond.bounce;
        ball.vx *= 0.82;
        ball.spin += ball.vx * 0.05;
        if (Math.abs(ball.vy) < 1) ball.vy = 0;
    }

    // Ceiling
    if (ball.y - ball.r < 0) {
        ball.y = ball.r;
        ball.vy *= -cond.bounce;
    }

    // Side walls — only block at goal posts when NOT in goal zone height
    const inGoalZone = ball.y > GROUND - GOAL_H;

    if (!inGoalZone) {
        if (ball.x - ball.r < GOAL_POST) { ball.x = GOAL_POST + ball.r; ball.vx *= -cond.bounce; }
        if (ball.x + ball.r > W - GOAL_POST) { ball.x = W - GOAL_POST - ball.r; ball.vx *= -cond.bounce; }
    }
    // Hard walls
    if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx *= -0.5; }
    if (ball.x + ball.r > W)  { ball.x = W - ball.r; ball.vx *= -0.5; }
}

function playerBallCollide(p) {
    const dx = ball.x - p.x, dy = ball.y - p.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const minDist = PLAYER_R + ball.r;

    if (dist < minDist && dist > 0) {
        // Normal
        const nx = dx/dist, ny = dy/dist;
        // Overlap push
        const overlap = minDist - dist;
        ball.x += nx * overlap * 0.8;
        ball.y += ny * overlap * 0.8;
        p.x -= nx * overlap * 0.2;
        p.y -= ny * overlap * 0.2;

        // Relative velocity
        const rvx = ball.vx - p.vx, rvy = ball.vy - p.vy;
        const relVN = rvx*nx + rvy*ny;
        if (relVN < 0) {
            const restitution = p.kicking ? Math.max(cond.bounce, 0.8) : cond.bounce;
            const j = -(1 + restitution) * relVN / 1.5;
            ball.vx += j * nx;
            ball.vy += j * ny;
            p.vx -= j * nx * 0.4;
            p.vy -= j * ny * 0.4;

            // Kick boost if kicking
            if (p.kicking) {
                const kickDir = p.side === 'left' ? 1 : -1;
                ball.vx += kickDir * 5;
                ball.vy -= 3;
                // Big ragdoll spin from kick
                p.angVel += kickDir * 0.55;
            }

            // Ragdoll spin from any hit
            p.angVel += (ball.vx - p.vx) * 0.045;
            ball.spin += (p.vx - ball.vx) * 0.1;
        }
    }
}

function ppCollide(a, b) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const minDist = PLAYER_R * 2;
    if (dist < minDist && dist > 0) {
        const nx = dx/dist, ny = dy/dist;
        const overlap = (minDist - dist) / 2;
        a.x -= nx * overlap; a.y -= ny * overlap;
        b.x += nx * overlap; b.y += ny * overlap;
        const rvx = a.vx - b.vx, rvy = a.vy - b.vy;
        const relVN = rvx*nx + rvy*ny;
        if (relVN > 0) {
            const j = relVN * 0.9;
            a.vx -= j * nx; a.vy -= j * ny;
            b.vx += j * nx; b.vy += j * ny;
            a.angVel -= j * 0.45; b.angVel += j * 0.45;
        }
    }
}

function playerPlayerCollide() {
    ppCollide(p1, p2);   ppCollide(p1, p2b);
    ppCollide(p1b, p2);  ppCollide(p1b, p2b);
    ppCollide(p1, p1b);  ppCollide(p2, p2b);
}

function checkGoal() {
    // Left goal: ball fully past left post and in goal height
    if (ball.x - ball.r < 2 && ball.y > GROUND - GOAL_H) {
        return 'right'; // right player scores
    }
    // Right goal
    if (ball.x + ball.r > W - 2 && ball.y > GROUND - GOAL_H) {
        return 'left'; // left player scores
    }
    return null;
}

// ── New round ──────────────────────────────────────────
function pickCondition() {
    cond = CONDITIONS[Math.floor(Math.random() * CONDITIONS.length)];
    particles = [];
    generateStars();
    roundConditionName = cond.name;
    showConditionTimer = 120;
    ball.r = cond.ballR;
}

function newRound(scoringSide) {
    if (scoringSide) {
        if (scoringSide === 'left') p1.score++;
        else p2.score++;
    }
    if (p1.score >= WIN_SCORE || p2.score >= WIN_SCORE) {
        winSide = p1.score >= WIN_SCORE ? 'left' : 'right';
        gameState = 'win';
        return;
    }
    pickCondition();
    resetPlayers();
    resetBall();
    gameState = 'playing';
}

function newGame() {
    p1  = makePlayer('left',    110, 1);
    p1b = makePlayer('left',    195, 2);
    p2  = makePlayer('right', W-110, 1);
    p2b = makePlayer('right', W-195, 2);
    pickCondition();
    resetBall();
    particles = [];
    winSide = null;
    goalSide = null;
    gameState = 'playing';
}

// ── Drawing ────────────────────────────────────────────
function drawField() {
    // Sky
    ctx.fillStyle = cond.sky;
    ctx.fillRect(0, 0, W, GROUND);

    // Stars
    if (cond.stars) {
        for (const s of stars) {
            s.twinkle += 0.04;
            const alpha = 0.5 + 0.5 * Math.sin(s.twinkle);
            ctx.globalAlpha = alpha;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
            ctx.fillStyle = '#fff';
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    // Ground
    ctx.fillStyle = cond.ground;
    ctx.fillRect(0, GROUND, W, H - GROUND);

    // Field markings
    ctx.globalAlpha = 0.18;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    // Center line
    ctx.beginPath();
    ctx.moveTo(W/2, 0); ctx.lineTo(W/2, GROUND);
    ctx.stroke();
    // Center circle
    ctx.beginPath();
    ctx.arc(W/2, GROUND, 60, Math.PI, 0);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Ground line
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(0, GROUND, W, 2);
}

function drawGoals() {
    const gx_l = 0;
    const gx_r = W - GOAL_POST;
    const gy_top = GROUND - GOAL_H;
    const postW = GOAL_POST;

    // Left goal net
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fillRect(gx_l, gy_top, postW, GOAL_H);

    // Net lines
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1;
    for (let x = 10; x < postW; x += 10) {
        ctx.beginPath(); ctx.moveTo(gx_l+x, gy_top); ctx.lineTo(gx_l+x, GROUND); ctx.stroke();
    }
    for (let y = gy_top + 12; y < GROUND; y += 12) {
        ctx.beginPath(); ctx.moveTo(gx_l, y); ctx.lineTo(gx_l+postW, y); ctx.stroke();
    }

    // Right goal net
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fillRect(gx_r, gy_top, postW, GOAL_H);
    for (let x = gx_r; x < W; x += 10) {
        ctx.beginPath(); ctx.moveTo(x, gy_top); ctx.lineTo(x, GROUND); ctx.stroke();
    }
    for (let y = gy_top + 12; y < GROUND; y += 12) {
        ctx.beginPath(); ctx.moveTo(gx_r, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // Posts
    ctx.fillStyle = '#ffffff';
    // Left: top bar + right post
    ctx.fillRect(gx_l, gy_top - 6, postW + 6, 6);        // top bar
    ctx.fillRect(GOAL_POST, gy_top - 6, 6, GOAL_H + 6);  // right post
    // Right: top bar + left post
    ctx.fillRect(gx_r - 6, gy_top - 6, postW + 6, 6);    // top bar
    ctx.fillRect(gx_r - 6, gy_top - 6, 6, GOAL_H + 6);   // left post
}

function drawPlayer(p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);

    const f = p.side === 'left' ? 1 : -1;
    const kickProgress = p.kicking ? Math.max(0, p.kickTimer / 22) : 0;
    const kick = 1 - kickProgress;

    // Ragdoll arm flail from spin + velocity
    const spin  = p.angVel * 6;
    const drift = p.vx * 0.04;
    const frontArmAngle = f * (0.4 + spin - drift);
    const backArmAngle  = f * (-0.5 - spin + drift);

    // Leg angles
    const frontUpperLeg = f * (0.12 + kick * 0.8);
    const frontLowerLeg = -(kick * 0.6) + 0.15;
    const backUpperLeg  = f * -0.18;
    const backLowerLeg  = 0.15;

    // ── Soccer Random proportions ──────────────────────────
    // Pivot (0,0) = mid-torso
    const HY  = -22;   // head centre y
    const HR  = 14;    // head radius — big head is the signature
    const NY  = -7;    // torso top
    const WY  =  6;    // waist (torso bottom / leg root)
    const SY  = -3;    // shoulder y
    const AL  = 18;    // arm total length (single stick, no elbow)
    const UL  = 13;    // upper leg
    const LL  = 11;    // lower leg
    const legCol  = '#1e1e3a';   // dark navy legs (same both teams)
    const shoeCol = '#0d0d1a';   // near-black shoes

    // ── BACK ARM (single stick, team color) ───────────────────
    ctx.save();
    ctx.translate(-f * 4, SY);
    ctx.rotate(backArmAngle);
    ctx.fillStyle = darken(p.color, 0.18);
    ctx.beginPath(); ctx.roundRect(-2.5, 0, 5, AL, 3); ctx.fill();
    ctx.restore();

    // ── BACK LEG ─────────────────────────────────────────────
    ctx.save();
    ctx.translate(-f * 3, WY);
    ctx.rotate(backUpperLeg);
    ctx.fillStyle = legCol;
    ctx.beginPath(); ctx.roundRect(-3, 0, 6, UL, 2); ctx.fill();
    ctx.translate(0, UL); ctx.rotate(backLowerLeg);
    ctx.beginPath(); ctx.roundRect(-3, 0, 6, LL, 2); ctx.fill();
    ctx.fillStyle = shoeCol;
    ctx.beginPath(); ctx.roundRect(-2, LL, 8, 4, 2); ctx.fill();
    ctx.restore();

    // ── TORSO (flat team-color rectangle, no stripes) ─────────
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.roundRect(-8, NY, 16, WY - NY, [3, 3, 4, 4]);
    ctx.fill();

    // ── FRONT LEG ────────────────────────────────────────────
    ctx.save();
    ctx.translate(f * 3, WY);
    ctx.rotate(frontUpperLeg);
    ctx.fillStyle = legCol;
    ctx.beginPath(); ctx.roundRect(-3, 0, 6, UL, 2); ctx.fill();
    ctx.translate(0, UL); ctx.rotate(frontLowerLeg);
    ctx.beginPath(); ctx.roundRect(-3, 0, 6, LL, 2); ctx.fill();
    ctx.fillStyle = shoeCol;
    ctx.beginPath(); ctx.roundRect(-2, LL, 8, 4, 2); ctx.fill();
    ctx.restore();

    // ── HEAD (big, fully team-colored, the defining feature) ──
    ctx.beginPath(); ctx.arc(0, HY, HR, 0, Math.PI*2);
    ctx.fillStyle = p.color; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.22)'; ctx.lineWidth = 1.5; ctx.stroke();

    // Eyes: two white circles + black pupils (no shine)
    const ex = f * 5.5;
    ctx.beginPath(); ctx.arc(ex, HY, 3.5, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.beginPath(); ctx.arc(ex + f * 1.2, HY + 0.5, 2, 0, Math.PI*2);
    ctx.fillStyle = '#111'; ctx.fill();

    // ── FRONT ARM (single stick, team color, drawn over head) ─
    ctx.save();
    ctx.translate(f * 4, SY);
    ctx.rotate(frontArmAngle);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.roundRect(-2.5, 0, 5, AL, 3); ctx.fill();
    ctx.restore();

    ctx.restore();
}

function drawBall() {
    ctx.save();
    ctx.translate(ball.x, ball.y);
    ctx.rotate(ball.spin);

    const r = ball.r;

    // Shadow
    ctx.beginPath();
    ctx.ellipse(0, r * 0.85, r * 0.7, r * 0.25, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fill();

    // Ball
    const grad = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.05, 0, 0, r);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.4, '#f0f0f0');
    grad.addColorStop(1, '#c0c0c0');
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Soccer pattern (simplified pentagons using arcs)
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = Math.max(1, r * 0.08);
    // Center pentagon-ish
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.32, 0, Math.PI*2);
    ctx.fillStyle = '#222';
    ctx.fill();
    // Surrounding patches
    for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI * 2 - Math.PI/2;
        const px = Math.cos(a) * r * 0.6;
        const py = Math.sin(a) * r * 0.6;
        ctx.beginPath();
        ctx.arc(px, py, r * 0.22, 0, Math.PI*2);
        ctx.fillStyle = '#222';
        ctx.fill();
    }

    // Shine
    ctx.beginPath();
    ctx.arc(-r*0.32, -r*0.32, r*0.18, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fill();

    ctx.restore();
}

function drawParticles() {
    for (const p of particles) {
        ctx.globalAlpha = p.alpha;
        if (p.type === 'snow') {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
            ctx.fillStyle = '#fff';
            ctx.fill();
        } else {
            ctx.strokeStyle = '#93c5fd';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p.x - 3, p.y - 12);
            ctx.stroke();
        }
    }
    ctx.globalAlpha = 1;
}

function drawHUD() {
    // Score background
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    roundRect2(ctx, W/2-130, 10, 260, 44, 10);
    ctx.fill();

    // Scores
    ctx.font = 'bold 26px "Plus Jakarta Sans", sans-serif';
    ctx.textAlign = 'center';

    ctx.fillStyle = p1.color;
    ctx.fillText(p1.score, W/2 - 60, 40);

    ctx.fillStyle = '#94a3b8';
    ctx.font = 'bold 16px Inter, sans-serif';
    ctx.fillText('—', W/2, 37);

    ctx.fillStyle = p2.color;
    ctx.font = 'bold 26px "Plus Jakarta Sans", sans-serif';
    ctx.fillText(p2.score, W/2 + 60, 40);

    // Condition badge
    if (showConditionTimer > 0) {
        const alpha = Math.min(1, showConditionTimer / 30);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        roundRect2(ctx, W/2-100, 62, 200, 30, 8);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = '600 13px Inter, sans-serif';
        ctx.fillText(cond.name, W/2, 81);
        ctx.globalAlpha = 1;
        showConditionTimer--;
    }

    // Wind indicator
    if (cond.wind !== 0) {
        const wx = W/2;
        const wy = GROUND - 25;
        ctx.globalAlpha = 0.4 + 0.2 * Math.sin(frameCount * 0.1);
        ctx.fillStyle = '#fbbf24';
        ctx.font = '16px sans-serif';
        ctx.fillText(cond.wind > 0 ? '→→→' : '←←←', wx, wy);
        ctx.globalAlpha = 1;
    }
}

function drawGoalEffect() {
    const t = 1 - goalTimer / 90;
    const size = 60 + t * 30;
    ctx.globalAlpha = Math.max(0, 1 - t * 1.5);
    ctx.font = `bold ${size}px "Plus Jakarta Sans", sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fbbf24';
    ctx.fillText('GOAL!', W/2, H/2 - 30);
    const scorer = goalSide === 'left' ? p1 : p2;
    ctx.font = 'bold 22px Inter, sans-serif';
    ctx.fillStyle = scorer.color;
    ctx.fillText((goalSide === 'left' ? 'Blue' : 'Red') + ' scores!', W/2, H/2 + 20);
    ctx.globalAlpha = 1;
}

function drawWinScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, W, H);

    const winner = winSide === 'left' ? p1 : p2;
    const winName = winSide === 'left' ? 'Blue' : 'Red';
    const pulse = 1 + 0.05 * Math.sin(frameCount * 0.1);

    ctx.save();
    ctx.translate(W/2, H/2 - 20);
    ctx.scale(pulse, pulse);
    ctx.font = 'bold 52px "Plus Jakarta Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = winner.color;
    ctx.fillText(winName + ' Wins!', 0, 0);
    ctx.restore();

    ctx.font = '600 18px Inter, sans-serif';
    ctx.fillStyle = '#94a3b8';
    ctx.fillText(p1.score + ' — ' + p2.score, W/2, H/2 + 36);

    ctx.fillStyle = '#6366f1';
    roundRect2(ctx, W/2-90, H/2+58, 180, 42, 10);
    ctx.fill();
    ctx.font = 'bold 16px Inter, sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText('Play Again', W/2, H/2+84);
}

// ── Helpers ────────────────────────────────────────────
function roundRect2(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
}

function lighten(hex, amt) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgb(${Math.min(255,r+amt*255)},${Math.min(255,g+amt*255)},${Math.min(255,b+amt*255)})`;
}
function darken(hex, amt) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgb(${Math.max(0,r-amt*255)},${Math.max(0,g-amt*255)},${Math.max(0,b-amt*255)})`;
}

// ── Game loop ──────────────────────────────────────────
function update() {
    frameCount++;

    if (gameState === 'playing') {
        updateParticles();
        playerUpdate(p1); playerUpdate(p1b);
        playerUpdate(p2); playerUpdate(p2b);
        ballUpdate();
        playerBallCollide(p1); playerBallCollide(p1b);
        playerBallCollide(p2); playerBallCollide(p2b);
        playerPlayerCollide();

        const scored = checkGoal();
        if (scored) {
            goalSide = scored;
            goalTimer = 90;
            gameState = 'goal';
        }
    } else if (gameState === 'goal') {
        updateParticles();
        goalTimer--;
        if (goalTimer <= 0) {
            newRound(goalSide);
        }
    } else if (gameState === 'win') {
        updateParticles();
        frameCount++;
    }
}

function draw() {
    ctx.clearRect(0, 0, W, H);

    drawField();
    drawParticles();
    drawGoals();
    drawPlayer(p1); drawPlayer(p1b);
    drawPlayer(p2); drawPlayer(p2b);
    drawBall();
    drawHUD();

    if (gameState === 'goal') drawGoalEffect();
    if (gameState === 'win') drawWinScreen();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// ── Init ───────────────────────────────────────────────
generateStars();
pickCondition();
resetBall();
loop();
</script>
